name: journey_forward
description: Journey Forward — sobriety support app · Stillwater Aesthetic System v6.1
publish_to: 'none'
version: 6.3.0+22

environment:
  sdk: '>=3.5.0 <4.0.0'   # flutter_web_auth_2 5.x requires Dart >=3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Storage ──────────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2      # main data store (mirrors @capacitor/preferences)
  flutter_secure_storage: ^9.2.2  # PIN hash storage

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Local notifications ───────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0          # resolves device IANA timezone name for correct DST handling

  # ── Auth / lock ───────────────────────────────────────────────────────────────
  local_auth: ^2.3.0              # biometric (mirrors @capgo/capacitor-native-biometric)

  # ── STT ──────────────────────────────────────────────────────────────────────
  speech_to_text: ^7.0.0          # journal voice entry

  # ── Ambient audio (rain · forest · ocean · fire) ──────────────────────────────
  just_audio: ^0.9.40

  # ── Sharing / export ──────────────────────────────────────────────────────────
  share_plus: ^10.0.0             # milestone card share sheet + backup export
  pdf: ^3.10.8                    # weekly care summary PDF generation
  path_provider: ^2.1.4           # temp directory for PDF export

  # ── Media ─────────────────────────────────────────────────────────────────────
  image_picker: ^1.1.2            # vision board — camera + gallery
  file_picker: ^8.1.2             # backup restore — .json file picker

  # ── Charts (Insights screen) ──────────────────────────────────────────────────
  fl_chart: ^0.69.0               # line, bar, pie charts

  # ── PIN hashing ───────────────────────────────────────────────────────────────
  crypto: ^3.0.5                  # PBKDF2-HMAC-SHA256 PIN hash — never stored in plaintext

  # ── Utilities ─────────────────────────────────────────────────────────────────
  url_launcher: ^6.3.1            # crisis lines call buttons, recovery group links
  intl: ^0.20.2                   # date formatting, en-ZA locale for ZAR amounts

  # ── Networking / OAuth (Strava planner integration) ──────────────────────────
  http: ^1.2.0                    # Strava REST API calls (token exchange + activities)
  flutter_web_auth_2: ^5.0.3      # Strava OAuth authorization-code flow (in-app browser tab)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.13.1

# ─── Adaptive launcher icon generation ────────────────────────────────────────
# Drop a 1024×1024 PNG at `assets/icons/launcher_foreground.png` (the green
# leaf/plant glyph on a TRANSPARENT background — the system applies the
# background colour and the round/squircle mask). Then run:
#   flutter pub run flutter_launcher_icons
# This regenerates mipmap-anydpi-v26 (adaptive) + legacy PNGs for older APIs.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icons/launcher_foreground.png"
  min_sdk_android: 24
  adaptive_icon_background: "#FBF4E3"   # wave-leaf icon tile (cream)
  adaptive_icon_foreground: "assets/icons/launcher_foreground.png"
  adaptive_icon_monochrome: "assets/icons/launcher_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/growth_stages/
    - assets/icons/
    - assets/lottie/        # optional: celebration animations
    - assets/audio/         # bundled meditation audio (urge surfing)
    - assets/strava/        # Strava branding assets (powered-by marks per brand guidelines)

  # ── Bundled fonts (offline, no network round-trip) ──────────────────────────
  # Both files are variable fonts (SIL Open Font License). Flutter handles all
  # weights from a single .ttf — no need to bundle separate Regular/Bold files.
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
